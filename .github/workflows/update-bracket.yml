name: Update daily data

on:
  schedule:
    # 06:00 UTC daily, shown to users on the Bracket page as "updates at 6am UTC".
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bracket
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Update bracket
        run: npm run update-bracket
      - name: Commit bracket if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/matches.ts
          if git diff --cached --quiet; then
            echo "No bracket changes to commit."
          else
            git commit -m "Update bracket ($(date -u +%Y-%m-%d))"
            git push
          fi
      # Requires a free API key from the-odds-api.com added as the ODDS_API_KEY repo
      # secret (Settings -> Secrets and variables -> Actions). Runs after the bracket
      # commit above so a missing/invalid key here doesn't hold back that update.
      - name: Update odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run update-odds
      - name: Commit odds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/odds.ts
          if git diff --cached --quiet; then
            echo "No odds changes to commit."
          else
            git commit -m "Update odds ($(date -u +%Y-%m-%d))"
            git push
          fi
      - name: Update bonus stats
        run: npm run update-bonus-stats
      - name: Commit bonus stats if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/bonusStats.ts
          if git diff --cached --quiet; then
            echo "No bonus stats changes to commit."
          else
            git commit -m "Update bonus stats ($(date -u +%Y-%m-%d))"
            git push
          fi
