name: Update daily data

on:
  schedule:
    # 04:00 UTC daily, shown to users on the Bracket page as "updates at 4am UTC".
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-bracket
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Update bracket
        run: npm run update-bracket
      - name: Commit bracket if changed
        id: commit_bracket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/matches.ts
          if git diff --cached --quiet; then
            echo "No bracket changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update bracket ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # Requires a free API key from the-odds-api.com added as the ODDS_API_KEY repo
      # secret (Settings -> Secrets and variables -> Actions). `if: always()` on this
      # and every step below keeps the three updates (bracket/odds/bonus stats)
      # independent — a failure in one (e.g. a bad odds key) must never skip the
      # others, since GitHub Actions otherwise skips all later steps by default.
      - name: Update odds
        if: always()
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run update-odds
      - name: Commit odds if changed
        id: commit_odds
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/odds.ts
          if git diff --cached --quiet; then
            echo "No odds changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update odds ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Update bonus stats
        if: always()
        run: npm run update-bonus-stats
      - name: Commit bonus stats if changed
        id: commit_bonus_stats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/bonusStats.ts
          if git diff --cached --quiet; then
            echo "No bonus stats changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update bonus stats ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Commits made with the default GITHUB_TOKEN don't trigger other workflows'
      # `on: push` events (GitHub's built-in loop-prevention), so deploy.yml would
      # otherwise never re-run after a bot commit. Dispatch it explicitly instead —
      # API-triggered runs aren't subject to that restriction.
      - name: Trigger Pages deploy if data changed
        if: always() && (steps.commit_bracket.outputs.changed == 'true' || steps.commit_odds.outputs.changed == 'true' || steps.commit_bonus_stats.outputs.changed == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY" --ref main
